<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>博客</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- 👈 引入 marked.js 库 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/contrib/auto-render.min.js"
    onload="renderMathInElement(document.body);"></script>
</head>
<body>

    <nav class="navbar">
        <a href="index.html">首页</a>
        <a href="#">存档</a>
        <a href="#">关于</a>
        <a href="#">联系</a>
    </nav>

    <div class="container">
        <h1 class="page-title">博客</h1>
        
        <div class="post-list" id="post-list">
            <!-- 文章列表会通过 JavaScript 动态加载 -->
        </div>

        <footer class="footer">
            <p>&copy; 2024 我的博客</p>
        </footer>
    </div>

    <script>
        // 文章列表（文件名和标题）
        const posts = [
            { file: 'posts/O-LoRA.md', title: '我的第一篇文章', date: '2026-03-29' },
            { file: 'posts/second-post.md', title: '第二篇文章', date: '2024-01-05' },
            { file: 'posts/third-post.md', title: '第三篇文章', date: '2024-01-10' }
        ];

        // 加载文章列表
        async function loadPosts() {
            const list = document.getElementById('post-list');
            
            for (const post of posts) {
                try {
                    const response = await fetch(post.file);
                    const content = await response.text();
                    
                    // 提取摘要（取前150个字符）
                    const plainText = content.replace(/[#*`\[\]]/g, '').substring(0, 150);
                    
                    list.innerHTML += `
                        <div class="post-card">
                            <h3><a href="post.html?file=${post.file}">${post.title}</a></h3>
                            <p class="post-date">${post.date}</p>
                            <p class="post-excerpt">${plainText}...</p>
                            <a href="post.html?file=${post.file}" class="read-more">阅读全文 →</a>
                        </div>
                    `;
                } catch (e) {
                    console.log('文章加载失败:', post.file);
                }
            }
        }

        loadPosts();
    </script>

</body>
</html>
