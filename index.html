<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的博客</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-image: url('images/background.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* 顶部导航栏 */
        .navbar {
            background-color: #333;
            padding: 15px 30px;
            display: flex;
            justify-content: center;
            gap: 40px;
            position: fixed;
            top: 0;
            width: 100%;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            font-size: 16px;
        }

        .navbar a:hover {
            color: #4CAF50;
        }

        /* 主内容区域 */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 100px 20px 50px;
        }

        /* 页面标题 */
        .page-title {
            text-align: center;
            margin-bottom: 40px;
            color: #333;
            font-size: 32px;
        }

        /* 文章列表 */
        .post-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 文章矩形卡片 */
        .post-card {
            background: white;
            padding: 25px 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .post-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }

        .post-card h3 {
            margin-bottom: 10px;
        }

        .post-card h3 a {
            color: #333;
            text-decoration: none;
        }

        .post-card h3 a:hover {
            color: #4CAF50;
        }

        .post-date {
            color: #999;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .post-excerpt {
            color: #666;
            line-height: 1.6;
        }

        .read-more {
            display: inline-block;
            margin-top: 15px;
            color: #4CAF50;
            text-decoration: none;
            font-size: 14px;
        }

        .read-more:hover {
            text-decoration: underline;
        }

        /* 页脚 */
        .footer {
            text-align: center;
            padding: 30px;
            color: #999;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <!-- 顶部导航 -->
    <nav class="navbar">
        <a href="index.html">博客</a>
    </nav>

    <!-- 主内容 -->
    <div class="container">
        <h1 class="page-title">博客</h1>

        <div class="post-list">

            <!-- 文章 1 -->
            <div class="post-card">
                <h3><a href="_posts/2024-01-01-my-first-post.html">我的第一篇文章</a></h3>
                <p class="post-date">2024年1月1日</p>
                <p class="post-excerpt">这是文章的开头部分，简要介绍文章内容。阅读更多请点击下方链接...</p>
                <a href="_posts/2024-01-01-my-first-post.html" class="read-more">阅读全文 →</a>
            </div>

            <!-- 文章 2 -->
            <div class="post-card">
                <h3><a href="_posts/2024-01-05-second-post.html">第二篇文章标题</a></h3>
                <p class="post-date">2024年1月5日</p>
                <p class="post-excerpt">这是另一篇文章的摘要内容，简要描述文章要点...</p>
                <a href="_posts/2024-01-05-second-post.html" class="read-more">阅读全文 →</a>
            </div>

            <!-- 文章 3 -->
            <div class="post-card">
                <h3><a href="_posts/2024-01-10-third-post.html">第三篇文章标题</a></h3>
                <p class="post-date">2024年1月10日</p>
                <p class="post-excerpt">这里是第三篇文章的简短描述，介绍文章主要内容...</p>
                <a href="_posts/2024-01-10-third-post.html" class="read-more">阅读全文 →</a>
            </div>

        </div>

        <!-- 页脚 -->
        <footer class="footer">
            <p>&copy; 2024 我的博客</p>
        </footer>
    </div>

</body>
</html>
