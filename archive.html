<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>存档</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <a href="index.html">首页</a>
        <a href="archive.html">存档</a>
        <a href="#">关于</a>
        <a href="#">联系</a>
    </nav>

    <div class="container">
        <h1 class="page-title">存档</h1>

        <div class="breadcrumb">
            <span>存档</span>
        </div>

        <div class="category-list" id="category-list"></div>

        <footer class="footer">
            <p>&copy; 2024 我的博客</p>
        </footer>
    </div>

    <script>
        async function loadCategories() {
            try {
                const response = await fetch('posts.json');
                const posts = await response.json();

                const categories = {};
                posts.forEach(post => {
                    if (!categories[post.category]) {
                        categories[post.category] = {
                            count: 0,
                            subcategories: new Set(),
                            latestDate: post.date
                        };
                    }
                    categories[post.category].count++;
                    // 只有存在 subcategory 才添加
                    if (post.subcategory) {
                        categories[post.category].subcategories.add(post.subcategory);
                    }
                    if (new Date(post.date) > new Date(categories[post.category].latestDate)) {
                        categories[post.category].latestDate = post.date;
                    }
                });

                const list = document.getElementById('category-list');

                Object.entries(categories).forEach(([name, cat]) => {
                    const hasSub = cat.subcategories.size > 0;

                    // 有子类别 → 跳转 subcategory.html
                    // 无子类别 → 直接跳转 category.html
                    const href = hasSub
                        ? `subcategory.html?category=${encodeURIComponent(name)}`
                        : `category.html?category=${encodeURIComponent(name)}`;

                    const subInfo = hasSub
                        ? `${cat.subcategories.size} 个子类别`
                        : '无子类别';

                    const tagsHtml = hasSub
                        ? `<div class="subcategory-tags">
                             ${[...cat.subcategories].map(s => `<span class="tag">${s}</span>`).join('')}
                           </div>`
                        : '';

                    list.innerHTML += `
                        <a href="${href}" class="category-card">
                            <div class="card-icon">${hasSub ? '📁' : '📄'}</div>
                            <h3>${name}</h3>
                            <p>${cat.count} 篇文章 · ${subInfo}</p>
                            <p class="category-latest">最新: ${cat.latestDate}</p>
                            ${tagsHtml}
                        </a>
                    `;
                });

            } catch (e) {
                console.error('加载失败:', e);
                document.getElementById('category-list').innerHTML = '<p>加载失败</p>';
            }
        }

        loadCategories();
    </script>

</body>
</html>
