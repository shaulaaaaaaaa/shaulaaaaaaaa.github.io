<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章列表</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <a href="index.html">首页</a>
        <a href="archive.html">存档</a>
    </nav>

    <div class="container">
        <h1 class="page-title" id="page-title">加载中...</h1>

        <div class="breadcrumb" id="breadcrumb"></div>

        <div class="post-list" id="post-list"></div>

        <footer class="footer">
            <p>&copy; 2024 我的博客</p>
        </footer>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const categoryName = urlParams.get('category') ? decodeURIComponent(urlParams.get('category')) : null;
        const subcategoryName = urlParams.get('subcategory') ? decodeURIComponent(urlParams.get('subcategory')) : null;

        async function loadPosts() {
            // 设置标题
            document.getElementById('page-title').textContent = subcategoryName || categoryName;

            // 设置面包屑
            const breadcrumb = document.getElementById('breadcrumb');
            if (subcategoryName) {
                // 有子类别：存档 / 大类别 / 子类别
                breadcrumb.innerHTML = `
                    <a href="archive.html">存档</a>
                    <span> / </span>
                    <a href="subcategory.html?category=${encodeURIComponent(categoryName)}">${categoryName}</a>
                    <span> / </span>
                    <span>${subcategoryName}</span>
                `;
            } else {
                // 无子类别：存档 / 大类别
                breadcrumb.innerHTML = `
                    <a href="archive.html">存档</a>
                    <span> / </span>
                    <span>${categoryName}</span>
                `;
            }

            try {
                const response = await fetch('posts.json');
                const allPosts = await response.json();

                // 筛选文章
                let filtered;
                if (subcategoryName) {
                    // 按大类别 + 子类别筛选
                    filtered = allPosts.filter(
                        p => p.category === categoryName && p.subcategory === subcategoryName
                    );
                } else {
                    // 只按大类别筛选（无子类别的情况）
                    filtered = allPosts.filter(p => p.category === categoryName);
                }

                // 按日期排序
                filtered.sort((a, b) => new Date(b.date) - new Date(a.date));

                const list = document.getElementById('post-list');

                if (filtered.length === 0) {
                    list.innerHTML = '<p>暂无文章</p>';
                    return;
                }

                for (const post of filtered) {
                    try {
                        const res = await fetch(post.file);
                        const content = await res.text();
                        const plainText = content.replace(/[#*`\[\]]/g, '').substring(0, 150);

                        // 标签显示
                        const tagText = post.subcategory
                            ? `${post.category} / ${post.subcategory}`
                            : post.category;

                        list.innerHTML += `
                            <div class="post-card">
                                <h3><a href="post.html?file=${encodeURIComponent(post.file)}">${post.title}</a></h3>
                                <div class="post-meta">
                                    <span class="post-date">${post.date}</span>
                                    <span class="post-tag">${tagText}</span>
                                </div>
                                <p class="post-excerpt">${plainText}...</p>
                                <a href="post.html?file=${encodeURIComponent(post.file)}" class="read-more">阅读全文 →</a>
                            </div>
                        `;
                    } catch (e) {
                        console.log('文章加载失败:', post.file);
                    }
                }

            } catch (e) {
                console.error('加载失败:', e);
                document.getElementById('post-list').innerHTML = '<p>加载失败</p>';
            }
        }

        loadPosts();
    </script>

</body>
</html>
