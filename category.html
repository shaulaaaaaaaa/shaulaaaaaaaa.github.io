<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>类别</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <a href="index.html">首页</a>
        <a href="archive.html">存档</a>
        <a href="#">关于</a>
        <a href="#">联系</a>
    </nav>

    <div class="container">
        <h1 class="page-title" id="category-title">加载中...</h1>
        
        <a href="archive.html" class="back-link">← 返回存档</a>
        
        <div class="post-list" id="post-list"></div>

        <footer class="footer">
            <p>&copy; 2024 我的博客</p>
        </footer>
    </div>

    <script>
        // 从 URL 获取类别名称
        const urlParams = new URLSearchParams(window.location.search);
        const categoryName = decodeURIComponent(urlParams.get('name'));

        // 加载该类别的文章
        async function loadCategoryPosts() {
            document.getElementById('category-title').textContent = categoryName;

            try {
                const response = await fetch('posts.json');
                const allPosts = await response.json();

                // 筛选该类别的文章
                const categoryPosts = allPosts.filter(post => post.category === categoryName);

                // 按日期排序（最新的在前）
                categoryPosts.sort((a, b) => new Date(b.date) - new Date(a.date));

                // 渲染文章列表
                const list = document.getElementById('post-list');
                
                if (categoryPosts.length === 0) {
                    list.innerHTML = '<p>该分类下暂无文章</p>';
                    return;
                }

                for (const post of categoryPosts) {
                    const res = await fetch(post.file);
                    const content = await res.text();
                    const plainText = content.replace(/[#*`\[\]]/g, '').substring(0, 150);

                    list.innerHTML += `
                        <div class="post-card">
                            <h3><a href="post.html?file=${encodeURIComponent(post.file)}">${post.title}</a></h3>
                            <p class="post-date">${post.date}</p>
                            <p class="post-excerpt">${plainText}...</p>
                            <a href="post.html?file=${encodeURIComponent(post.file)}" class="read-more">阅读全文 →</a>
                        </div>
                    `;
                }

            } catch (e) {
                console.error('加载失败:', e);
                document.getElementById('post-list').innerHTML = '<p>加载失败</p>';
            }
        }

        loadCategoryPosts();
    </script>

</body>
</html>
