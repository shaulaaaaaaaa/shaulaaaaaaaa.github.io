<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>文章</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- KaTeX CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  
    <!-- marked：渲染 Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  
    <!-- KaTeX 核心 + 自动渲染插件 -->
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    

</head>
<body>

    <nav class="navbar">
        <a href="index.html">首页</a>
        <a href="#">存档</a>
        <a href="#">关于</a>
        <a href="#">联系</a>
    </nav>

    <div class="container">
        <div class="post-card">
            <h1 class="post-title" id="post-title">加载中...</h1>
            <p class="post-date" id="post-date"></p>
            <div class="post-content" id="post-content">
                <!-- 文章内容会通过 JavaScript 加载 -->
            </div>
            <a href="blog.html" class="back-link">← 返回博客列表</a>
        </div>

        <footer class="footer">
            <p>&copy; 2024 我的博客</p>
        </footer>
    </div>

    <script>
        // 从 URL 获取文件名
        const params = new URLSearchParams(window.location.search);
        const file = params.get('file');

        if (file) {
            fetch(file)
                .then(response => response.text())
                .then(content => {
                    // 解析 Markdown
                    document.getElementById('post-content').innerHTML = marked.parse(content);
                    
                    // 提取标题（从第一个 # 后面获取）
                    const titleMatch = content.match(/^#\s+(.+)$/m);
                    if (titleMatch) {
                        document.getElementById('post-title').textContent = titleMatch[1];
                    }
                })
                .catch(() => {
                    document.getElementById('post-content').innerHTML = '<p>文章加载失败</p>';
                });
        }
    </script>

</body>
</html>
