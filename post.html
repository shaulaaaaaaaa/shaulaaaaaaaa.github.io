<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>文章</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="latex.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']]
      },
      svg: {
        fontCache: 'global'
      }
    };
  </script>
  </script>
  // 配置 marked，保护 LaTeX 块不被处理
    marked.setOptions({
        breaks: false,
        gfm: true
    });
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
</head>
<body>
    <nav class="navbar">
      <a href="index.html">首页</a>
      <a href="#">存档</a>
      <a href="#">关于</a>
      <a href="#">联系</a>
    </nav>

    <div class="container">
      <div class="post-card">
        <h1 id="post-title" class="post-title">加载中...</h1>
        <div id="post-date" class="post-date"></div>
        <div id="post-content" class="post-content"></div>
      </div>

      <footer class="footer">
          <p>&copy; 2024 我的博客</p>
      </footer>
    </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const file = params.get('file');

    if (file) {
      fetch(file)
        .then(response => {
          if (!response.ok) throw new Error('文件加载失败');
          return response.text();
        })
        .then(async content => {
          const titleMatch = content.match(/^#\s+(.+)$/m);
          document.getElementById('post-title').textContent = titleMatch ? titleMatch[1] : '未命名文章';

          const dateMatch = content.match(/^Date:\s*(.+)$/mi);
          if (dateMatch) {
            document.getElementById('post-date').textContent = dateMatch[1];
          }

          document.getElementById('post-content').innerHTML = marked.parse(content);

          if (window.MathJax) {
            await MathJax.typesetPromise([document.getElementById('post-content')]);
          }
        })
        .catch(error => {
          document.getElementById('post-title').textContent = '加载失败';
          document.getElementById('post-content').innerHTML = '<p>文章加载失败，请检查文件路径。</p>';
          console.error(error);
        });
    } else {
      document.getElementById('post-title').textContent = '未指定文章';
      document.getElementById('post-content').innerHTML = '<p>URL 中没有传入 file 参数，例如：<code>post.html?file=posts/first-post.md</code></p>';
    }
  </script>
</body>
</html>
