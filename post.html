<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>文章</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="latex.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <script>
    // 配置 marked
    marked.setOptions({
      breaks: false,
      gfm: true
    });
  </script>

  <!-- MathJax 配置 -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']]
      },
      svg: {
        fontCache: 'global'
      },
      startup: {
        pageReady: () => {
          // 页面加载完成后不自动渲染，等待我们手动调用
          return MathJax.startup.defaultPageReady();
        }
      }
    };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
</head>
<body>
    <nav class="navbar">
      <a href="index.html">首页</a>
      <a href="archive.html">存档</a>
    </nav>

    <div class="container">
      <div class="post-card">
        <h1 id="post-title" class="post-title">加载中...</h1>
        <div id="post-date" class="post-date"></div>
        <div id="post-content" class="post-content"></div>
      </div>

      <footer class="footer">
          <p>&copy; 2024 我的博客</p>
      </footer>
    </div>

  <script>
    // 保护数学公式不被 Markdown 解析器破坏
    function protectMath(content) {
      const mathBlocks = [];

      // 先保护 $$...$$ 块（多行）
      content = content.replace(/\$\$([\s\S]+?)\$\$/g, (match, math) => {
        const index = mathBlocks.length;
        mathBlocks.push(`$$${math}$$`);
        return `%%MATHBLOCK${index}%%`;
      });

      // 再保护 $...$ 行内公式（非贪婪，避免匹配到 $$）
      content = content.replace(/(?<!\$)\$(?!\$)(.+?)(?<!\$)\$(?!\$)/g, (match, math) => {
        const index = mathBlocks.length;
        mathBlocks.push(`$${math}$`);
        return `%%MATHBLOCK${index}%%`;
      });

      return { content, mathBlocks };
    }

    // 还原数学公式
    function restoreMath(html, mathBlocks) {
      mathBlocks.forEach((block, index) => {
        html = html.replace(new RegExp(`%%MATHBLOCK${index}%%`, 'g'), block);
      });
      return html;
    }

    const params = new URLSearchParams(window.location.search);
    const file = params.get('file');

    if (file) {
      fetch(file)
        .then(response => {
          if (!response.ok) throw new Error('文件加载失败');
          return response.text();
        })
        .then(async content => {
          // 提取标题
          const titleMatch = content.match(/^#\s+(.+)$/m);
          document.getElementById('post-title').textContent = titleMatch ? titleMatch[1] : '未命名文章';

          // 提取日期
          const dateMatch = content.match(/^Date:\s*(.+)$/mi);
          if (dateMatch) {
            document.getElementById('post-date').textContent = dateMatch[1];
          }

          // 1. 保护数学公式
          const { content: protectedContent, mathBlocks } = protectMath(content);

          // 2. Markdown 渲染
          let html = marked.parse(protectedContent);

          // 3. 还原数学公式
          html = restoreMath(html, mathBlocks);

          // 4. 插入页面
          document.getElementById('post-content').innerHTML = html;

          // 5. MathJax 渲染
          if (window.MathJax && window.MathJax.typesetPromise) {
            await MathJax.typesetPromise([document.getElementById('post-content')]);
          }
        })
        .catch(error => {
          document.getElementById('post-title').textContent = '加载失败';
          document.getElementById('post-content').innerHTML = '<p>文章加载失败，请检查文件路径。</p>';
          console.error(error);
        });
    } else {
      document.getElementById('post-title').textContent = '未指定文章';
      document.getElementById('post-content').innerHTML = '<p>URL 中没有传入 file 参数，例如：<code>post.html?file=posts/first-post.md</code></p>';
    }
  </script>
</body>
</html>
