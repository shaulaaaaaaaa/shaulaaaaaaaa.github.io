<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>文章</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="latex.css" />
  <!-- Markdown 解析 -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- MathJax 配置 -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']]
      },
      svg: {
        fontCache: 'global'
      }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>



  <script>
    const params = new URLSearchParams(window.location.search);
    const file = params.get('file');

    if (file) {
      fetch(file)
        .then(response => {
          if (!response.ok) {
            throw new Error('文件加载失败');
          }
          return response.text();
        })
        .then(async content => {
          // 提取标题
          const titleMatch = content.match(/^#\s+(.+)$/m);
          if (titleMatch) {
            document.getElementById('post-title').textContent = titleMatch[1];
          } else {
            document.getElementById('post-title').textContent = '未命名文章';
          }

          // 提取日期（可选：如果 markdown 里写了 Date: 2024-01-01）
          const dateMatch = content.match(/^Date:\s*(.+)$/mi);
          if (dateMatch) {
            document.getElementById('post-date').textContent = dateMatch[1];
          }

          // 渲染 Markdown
          document.getElementById('post-content').innerHTML = marked.parse(content);

          // 渲染数学公式
          if (window.MathJax) {
            await MathJax.typesetPromise([document.getElementById('post-content')]);
          }
        })
        .catch(error => {
          document.getElementById('post-title').textContent = '加载失败';
          document.getElementById('post-content').innerHTML =
            '<p>文章加载失败，请检查文件路径是否正确。</p>';
          console.error(error);
        });
    } else {
      document.getElementById('post-title').textContent = '未指定文章';
      document.getElementById('post-content').innerHTML =
        '<p>URL 中没有传入 file 参数，例如：<code>post.html?file=posts/first-post.md</code></p>';
    }
  </script>

</body>
</html>
