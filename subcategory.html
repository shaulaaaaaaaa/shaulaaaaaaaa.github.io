<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>子类别</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <a href="index.html">首页</a>
        <a href="archive.html">存档</a>
        <a href="#">关于</a>
        <a href="#">联系</a>
    </nav>

    <div class="container">
        <h1 class="page-title" id="page-title">加载中...</h1>

        <div class="breadcrumb">
            <a href="archive.html">存档</a>
            <span> / </span>
            <span id="breadcrumb-category"></span>
        </div>

        <div class="category-list" id="subcategory-list"></div>

        <footer class="footer">
            <p>&copy; 2024 我的博客</p>
        </footer>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const categoryName = decodeURIComponent(urlParams.get('category'));

        async function loadSubcategories() {
            document.getElementById('page-title').textContent = categoryName;
            document.getElementById('breadcrumb-category').textContent = categoryName;

            try {
                const response = await fetch('posts.json');
                const allPosts = await response.json();

                // 筛选当前大类别
                const categoryPosts = allPosts.filter(p => p.category === categoryName);

                // 按子类别分组
                const subcategories = {};
                categoryPosts.forEach(post => {
                    if (!subcategories[post.subcategory]) {
                        subcategories[post.subcategory] = {
                            count: 0,
                            latestDate: post.date
                        };
                    }
                    subcategories[post.subcategory].count++;
                    if (new Date(post.date) > new Date(subcategories[post.subcategory].latestDate)) {
                        subcategories[post.subcategory].latestDate = post.date;
                    }
                });

                const list = document.getElementById('subcategory-list');

                if (Object.keys(subcategories).length === 0) {
                    list.innerHTML = '<p>暂无子类别</p>';
                    return;
                }

                Object.entries(subcategories).forEach(([name, sub]) => {
                    list.innerHTML += `
                        <a href="category.html?category=${encodeURIComponent(categoryName)}&subcategory=${encodeURIComponent(name)}" class="category-card subcategory-card">
                            <div class="card-icon">📄</div>
                            <h3>${name}</h3>
                            <p>${sub.count} 篇文章</p>
                            <p class="category-latest">最新: ${sub.latestDate}</p>
                        </a>
                    `;
                });

            } catch (e) {
                console.error('加载失败:', e);
                document.getElementById('subcategory-list').innerHTML = '<p>加载失败</p>';
            }
        }

        loadSubcategories();
    </script>

</body>
</html>
